spring.application.name=gerenciadorestacionamento
server.port=${SERVER_PORT:3003}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/parking_manager?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:parking}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:parking}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

garage.simulator.url=${GARAGE_SIMULATOR_URL:http://localhost:3000}
springdoc.swagger-ui.path=/swagger-ui.html
